name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

permissions:
  contents: write

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      # choose your default branch
      - master
      - main
    paths-ignore:
      - '*.md'
      - '*.png'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@master
        with:
          ref: "builds"
          path: "builds"
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clean old builds
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3
          rm -f $GITHUB_WORKSPACE/builds/plugins.json
          rm -f $GITHUB_WORKSPACE/builds/repo.json

      - name: Setup Java 17
        uses: actions/setup-java@v4.6.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Access Secrets
        env:
          TMDB_API: ${{ secrets.TMDB_API }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          ILCORSAROVIOLAVERCEL: ${{ secrets.ILCORSAROVIOLAVERCEL }}
        run: |
          cd $GITHUB_WORKSPACE/src
          echo TMDB_API=$TMDB_API >> secrets.properties
          echo SIMKL_CLIENT_ID=$SIMKL_CLIENT_ID >> secrets.properties
          echo ILCORSAROVIOLAVERCEL=$ILCORSAROVIOLAVERCEL >> secrets.properties

      - name: Build Plugins
        id: build_plugins
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          ./gradlew make makePluginsJson --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          echo "---- file .cs3 dopo Gradle:"
          find "$GITHUB_WORKSPACE/src" -type f -name '*.cs3' -print
          find "$GITHUB_WORKSPACE/src" -type f -name '*.cs3' -exec cp -f {} "$GITHUB_WORKSPACE/builds/" \;
          n=$(find "$GITHUB_WORKSPACE/builds" -maxdepth 1 -name '*.cs3' | wc -l)
          echo "Copiati in builds/: $n file .cs3"
          test "$n" -ge 1
          # CloudStream usa repo.json come manifest ("Add repository"); Gradle genera solo plugins.json.
          PLUGINS_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/builds/plugins.json"
          jq -n \
            --arg url "$PLUGINS_URL" \
            '{name: "CescoRepository streaming", description: "Estensioni CloudStream (build CI).", manifestVersion: 1, pluginLists: [$url]}' \
            > build/repo.json
          cp -f build/plugins.json "$GITHUB_WORKSPACE/builds/"
          cp -f build/repo.json "$GITHUB_WORKSPACE/builds/"

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: ${{ github.workspace }}/gradle-build.log
          if-no-files-found: ignore

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Build $GITHUB_SHA" || exit 0   # do not error if nothing to commit
          git push
